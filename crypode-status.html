<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Crypode – WhatsApp Status Card</title>
    <!-- Google Fonts (matching website) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0D0D0D; /* dark background for safe area */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Tajawal', sans-serif;
            padding: 20px;
        }

        /* WhatsApp status recommended size: 1080x1920 */
        .status-card {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(145deg, #0D0D0D 0%, #141414 100%);
            border-radius: 60px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 60px;
        }

        /* decorative noise similar to website */
        .status-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            opacity: 0.5;
        }

        /* gold decorative lines */
        .status-card::after {
            content: '';
            position: absolute;
            top: 80px;
            left: 60px;
            right: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
        }

        .gold-border {
            position: absolute;
            bottom: 80px;
            left: 60px;
            right: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
        }

        /* logo area */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .logo svg {
            width: 90px;
            height: 90px;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 4.2rem;
            color: #C9A84C;
            letter-spacing: 4px;
            font-weight: 500;
        }

        /* tagline */
        .tagline {
            font-size: 1.4rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #C9A84C;
            border: 1px solid rgba(201,168,76,0.3);
            padding: 8px 24px;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 70px;
            background: rgba(201,168,76,0.05);
        }

        /* main message */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 400;
            line-height: 1.2;
            color: #F5F0E8;
            margin-bottom: 40px;
            max-width: 800px;
        }

        h1 em {
            color: #C9A84C;
            font-style: italic;
        }

        .description {
            font-size: 1.6rem;
            color: #888880;
            line-height: 1.5;
            margin-bottom: 70px;
            max-width: 800px;
        }

        /* qr code container */
        .qr-container {
            background: #FFFFFF;
            padding: 24px;
            border-radius: 48px;
            display: inline-block;
            margin-bottom: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 2px solid rgba(201,168,76,0.3);
        }

        .qr-container img {
            width: 280px;
            height: 280px;
            display: block;
            border-radius: 32px;
        }

        /* direct link button style */
        .direct-link {
            display: inline-block;
            background: #C9A84C;
            color: #0D0D0D;
            font-size: 1.8rem;
            font-weight: 700;
            padding: 20px 50px;
            border-radius: 60px;
            text-decoration: none;
            font-family: 'Tajawal', sans-serif;
            letter-spacing: 1px;
            transition: all 0.2s;
            margin-top: 30px;
            box-shadow: 0 10px 25px rgba(201,168,76,0.3);
        }

        .direct-link:hover {
            background: #E8C97A;
            transform: scale(1.02);
        }

        /* footer text */
        .footer-text {
            position: absolute;
            bottom: 50px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 1rem;
            color: #444440;
            letter-spacing: 1px;
        }

        /* responsive scaling for smaller previews (still 1080x1920) */
        @media (max-width: 1100px) {
            .status-card {
                transform: scale(0.7);
            }
        }
    </style>
</head>
<body>
<div class="status-card">
    <div class="logo">
        <!-- SVG logo (same as website) -->
        <svg width="90" height="90" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <rect width="512" height="512" rx="64" fill="#0D0D0D" />
            <rect x="8" y="8" width="496" height="496" rx="58" fill="none" stroke="#C9A84C" stroke-width="6" stroke-opacity="0.5" />
            <line x1="80" y1="110" x2="432" y2="110" stroke="#C9A84C" stroke-width="1.5" stroke-opacity="0.35" />
            <line x1="80" y1="402" x2="432" y2="402" stroke="#C9A84C" stroke-width="1.5" stroke-opacity="0.35" />
            <polygon points="256,50 268,38 280,50 268,62" fill="#C9A84C" opacity="0.7" />
            <polygon points="256,450 268,438 280,450 268,462" fill="#C9A84C" opacity="0.7" />
            <text x="108" y="310" font-family="Georgia,serif" font-size="210" font-weight="700" fill="#C9A84C">C</text>
            <text x="268" y="310" font-family="Georgia,serif" font-size="210" font-style="italic" font-weight="400" fill="#F5F0E8">p</text>
        </svg>
        <div class="logo-text">CRYPODE</div>
    </div>

    <div class="tagline">✦ REAL WISDOM · GULF PERSPECTIVE ✦</div>

    <h1>Money wisdom for those who carry <em>real weight</em></h1>

    <div class="description">
        Practical, honest financial guidance for Gulf professionals.<br>
        Debt • Islamic finance • Family • Side income.
    </div>

    <!-- QR Code: uses QuickChart.io API (free, no signup) to generate QR pointing to crypode.com -->
    <div class="qr-container">
        <img src="https://quickchart.io/qr?text=https%3A%2F%2Fcrypode.com&size=400&margin=2&dark=C9A84C&light=FFFFFF" alt="QR Code for crypode.com">
    </div>

    <!-- Direct clickable hyperlink -->
    <a href="https://crypode.com" target="_blank" class="direct-link">👉 crypode.com 👈</a>

    <div class="footer-text">Scan or click — start your journey to real financial clarity.</div>
    <div class="gold-border"></div>
</div>
</body>
</html>
